name: Fetch Export Sales

on:
  schedule:
    - cron: '30 14 * * 4'
  workflow_dispatch:

jobs:
  fetch-export-sales:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        # FIX: was only 'pip install requests' — fetch_export_sales.py imports
        # beautifulsoup4 (from bs4 import BeautifulSoup) for HTML parsing in
        # Strategy 2 (ESR HTML report). Without it, workflow crashed every Thursday.
        run: pip install requests beautifulsoup4

      - name: Fetch USDA FAS Export Sales
        run: python scripts/fetch_export_sales.py

      - name: Commit data/export-sales.json
        run: |
          git config user.name "AGSIST Bot"
          git config user.email "bot@agsist.com"
          git add data/export-sales.json
          git diff --staged --quiet || git commit -m "chore: update export sales $(date +%F)"
          git pull --rebase origin main
          git push
