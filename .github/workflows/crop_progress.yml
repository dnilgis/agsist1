name: Fetch Crop Progress

on:
  schedule:
    # Mondays 4:30 PM CT (21:30 UTC) — after 4:00 PM ET NASS release
    # Off-season runs write in_season:false gracefully
    - cron: '30 21 * * 1'
  workflow_dispatch:

jobs:
  fetch-crop-progress:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch USDA NASS Crop Progress
        env:
          NASS_API_KEY: ${{ secrets.NASS_API_KEY }}
        run: python scripts/fetch_crop_progress.py

      - name: Commit data/crop-progress.json
        run: |
          git config user.name "AGSIST Bot"
          git config user.email "bot@agsist.com"
          git add data/crop-progress.json
          git diff --staged --quiet || git commit -m "chore: update crop progress $(date +%F)"
          git push
