name: Fetch Prediction Markets

on:
  schedule:
    # Once daily at 6:00 AM CT (11:00 UTC)
    # Runs alongside daily briefing generation
    - cron: '0 11 * * *'
  workflow_dispatch:  # Manual trigger for testing

permissions:
  contents: write

jobs:
  fetch-markets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch prediction markets
        run: python scripts/fetch_markets.py

      - name: Commit updated markets.json
        run: |
          git config user.name "AGSIST Bot"
          git config user.email "bot@agsist.com"
          git add data/markets.json
          git diff --cached --quiet || git commit -m "📊 Update prediction markets $(date -u +%Y-%m-%d)"
          git push
