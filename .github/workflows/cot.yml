name: Fetch COT Data

on:
  schedule:
    - cron: '0 14 * * 6'
  workflow_dispatch:

jobs:
  fetch-cot:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch CFTC COT data
        run: python scripts/fetch_cot.py

      - name: Commit COT data
        run: |
          git config user.name "AGSIST Bot"
          git config user.email "bot@agsist.com"
          # FIX: was only adding cot.json — cot-history.json (used by COT chart page)
          # was never committed, leaving the chart page perpetually stale
          git add data/cot.json data/cot-history.json
          git diff --staged --quiet || git commit -m "chore: update COT data $(date +%F)"
          git pull --rebase origin main
          git push
